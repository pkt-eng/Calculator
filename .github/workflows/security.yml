name: CodeGuardAI Build & Protect

on:
  push:
    branches:
      - "**"

  pull_request:
    branches:
      - "**"

jobs:
  build:
    name: Build, Verify & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0"

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      # ==========================================
      # DETECT PROJECTS
      # ==========================================

      - name: Detect Frontend Project
        run: |
          PACKAGE_JSON=$(find . -name "package.json" -not -path "*/node_modules/*" | head -1)

          if [ -n "$PACKAGE_JSON" ]; then
            FRONTEND_DIR=$(dirname "$PACKAGE_JSON")
            echo "FRONTEND_DIR=$FRONTEND_DIR" >> $GITHUB_ENV
            echo "Frontend detected at: $FRONTEND_DIR"
          else
            echo "No frontend project found."
          fi

      - name: Detect .NET Solution
        run: |
          SOLUTION_FILE=$(find . -name "*.sln" | head -1)

          if [ -n "$SOLUTION_FILE" ]; then
            echo "SOLUTION_FILE=$SOLUTION_FILE" >> $GITHUB_ENV
            echo "Solution detected: $SOLUTION_FILE"
          else
            echo "No .NET solution found."
          fi

      # ==========================================
      # FRONTEND BUILD
      # ==========================================

      - name: Install and Build Frontend
        id: build_frontend
        if: env.FRONTEND_DIR != ''
        continue-on-error: true
        run: |
          cd "$FRONTEND_DIR"

          npm install \
            2>&1 | tee "$GITHUB_WORKSPACE/npm_install_log.txt"

          INSTALL_EXIT=${PIPESTATUS[0]}

          npm run build \
            2>&1 | tee "$GITHUB_WORKSPACE/build_log_frontend.txt"

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $INSTALL_EXIT -ne 0 ] || [ $BUILD_EXIT -ne 0 ]; then
            echo "Frontend build failed"
            exit 1
          fi

      # ==========================================
      # BACKEND BUILD
      # ==========================================

      - name: Build Backend
        id: build_backend
        if: env.SOLUTION_FILE != ''
        continue-on-error: true
        run: |
          dotnet restore "$SOLUTION_FILE" \
            2>&1 | tee "$GITHUB_WORKSPACE/dotnet_restore_log.txt"

          RESTORE_EXIT=${PIPESTATUS[0]}

          dotnet build "$SOLUTION_FILE" --no-restore \
            2>&1 | tee "$GITHUB_WORKSPACE/build_log_backend.txt"

          BUILD_EXIT=${PIPESTATUS[0]}

          if [ $RESTORE_EXIT -ne 0 ] || [ $BUILD_EXIT -ne 0 ]; then
            echo "Backend build failed"
            exit 1
          fi

      # ==========================================
      # FRONTEND SECURITY AUDIT
      # ==========================================

      - name: Audit Frontend Dependencies
        id: audit_frontend
        if: env.FRONTEND_DIR != ''
        continue-on-error: true
        run: |
          cd "$FRONTEND_DIR"

          npm audit --audit-level=high \
            2>&1 | tee "$GITHUB_WORKSPACE/security_log_frontend.txt"

          AUDIT_EXIT=${PIPESTATUS[0]}

          if [ $AUDIT_EXIT -ne 0 ]; then
            echo "Frontend vulnerabilities detected"
            exit 1
          fi

      # ==========================================
      # BACKEND SECURITY AUDIT
      # ==========================================

      - name: Audit Backend Dependencies
        id: audit_backend
        if: env.SOLUTION_FILE != ''
        continue-on-error: true
        run: |
          dotnet list "$SOLUTION_FILE" package --vulnerable \
            2>&1 | tee "$GITHUB_WORKSPACE/security_log_backend.txt"

          if grep -iq "vulnerable" "$GITHUB_WORKSPACE/security_log_backend.txt"; then
            echo "Vulnerable NuGet packages detected"
            exit 1
          fi

      # ==========================================
      # CUSTOM SECURITY SCAN
      # ==========================================

      - name: Scan Source Code For Security Findings
        id: custom_scan
        continue-on-error: true
        run: |
          > "$GITHUB_WORKSPACE/source_security_findings.txt"

          grep -Rni \
            --include="*.html" \
            --include="*.ts" \
            --include="*.js" \
            --include="*.cs" \
            "SECURITY_FINDING:" . \
            >> "$GITHUB_WORKSPACE/source_security_findings.txt" || true

          if [ -s "$GITHUB_WORKSPACE/source_security_findings.txt" ]; then
            echo "Custom security findings detected"
            cat "$GITHUB_WORKSPACE/source_security_findings.txt"
            exit 1
          fi

      # ==========================================
      # FAIL JOB IF ANY STEP FAILED
      # ==========================================

      - name: Check Overall Status
        if: always()
        run: |
          if [[ "${{ steps.build_frontend.outcome }}" == "failure" ]] ||
             [[ "${{ steps.build_backend.outcome }}" == "failure" ]] ||
             [[ "${{ steps.audit_frontend.outcome }}" == "failure" ]] ||
             [[ "${{ steps.audit_backend.outcome }}" == "failure" ]] ||
             [[ "${{ steps.custom_scan.outcome }}" == "failure" ]]; then
            echo "One or more checks failed."
            exit 1
          fi

      # ==========================================
      # NOTIFY CODEGUARDAI
      # ==========================================

      - name: Notify CodeGuardAI on Failure
        if: failure()
        run: |
          LOG_CONTENT=""

          for FILE in \
            "$GITHUB_WORKSPACE/npm_install_log.txt" \
            "$GITHUB_WORKSPACE/build_log_frontend.txt" \
            "$GITHUB_WORKSPACE/build_log_backend.txt" \
            "$GITHUB_WORKSPACE/security_log_frontend.txt" \
            "$GITHUB_WORKSPACE/security_log_backend.txt" \
            "$GITHUB_WORKSPACE/source_security_findings.txt"
          do
            if [ -f "$FILE" ]; then
              LOG_CONTENT="$LOG_CONTENT\n\n===== $(basename "$FILE") =====\n$(tail -40 "$FILE")"
            fi
          done

          if [ -z "$LOG_CONTENT" ]; then
            LOG_CONTENT="No logs captured."
          fi

          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg runId "${{ github.run_id }}" \
            --arg errorMessage "$LOG_CONTENT" \
            --arg pusherName "${{ github.actor }}" \
            --arg githubPat "${{ secrets.CODEGUARD_GITHUB_PAT }}" \
            '{
              repo: $repo,
              branch: $branch,
              commitSha: $sha,
              runId: $runId,
              errorMessage: $errorMessage,
              pusherName: $pusherName,
              githubPat: $githubPat
            }')

          CODEGUARD_URL=$(echo "${{ secrets.CODEGUARD_API_URL }}" | xargs)

          echo "Sending payload to CodeGuardAI..."

          curl -v \
            -X POST \
            "${CODEGUARD_URL}/api/github/action-failure" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
