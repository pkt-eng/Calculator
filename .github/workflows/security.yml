name: CodeGuardAI Build & Protect

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build, Verify & Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      # ==========================================
      # DETECT PROJECT TYPES
      # ==========================================

      - name: Detect Frontend Project
        run: |
          PACKAGE_JSON=$(find . -name "package.json" -not -path "*/node_modules/*" | head -1)

          if [ ! -z "$PACKAGE_JSON" ]; then
            FRONTEND_DIR=$(dirname "$PACKAGE_JSON")
            echo "FRONTEND_DIR=$FRONTEND_DIR" >> $GITHUB_ENV
            echo "Frontend detected at: $FRONTEND_DIR"
          fi

      - name: Detect .NET Solution
        run: |
          SOLUTION_FILE=$(find . -name "*.sln" | head -1)

          if [ ! -z "$SOLUTION_FILE" ]; then
            echo "SOLUTION_FILE=$SOLUTION_FILE" >> $GITHUB_ENV
            echo "Solution detected: $SOLUTION_FILE"
          fi

      # ==========================================
      # FRONTEND BUILD
      # ==========================================

      - name: Install and Build Frontend
        id: build_frontend
        if: env.FRONTEND_DIR != ''
        run: |
          cd "$FRONTEND_DIR"
          {
            npm install
            npm run build
          } 2>&1 | tee build_log_frontend.txt

      # ==========================================
      # BACKEND BUILD
      # ==========================================

      - name: Build Backend
        id: build_backend
        if: env.SOLUTION_FILE != ''
        run: |
          {
            dotnet restore "$SOLUTION_FILE"
            dotnet build "$SOLUTION_FILE"
          } 2>&1 | tee build_log_backend.txt

      # ==========================================
      # FRONTEND SECURITY AUDIT
      # ==========================================

      - name: Audit Frontend Dependencies
        id: audit_frontend
        if: env.FRONTEND_DIR != ''
        run: |
          cd "$FRONTEND_DIR"
          npm audit --audit-level=high 2>&1 | tee security_log_frontend.txt

      # ==========================================
      # BACKEND SECURITY AUDIT
      # ==========================================

      - name: Audit Backend Dependencies
        id: audit_backend
        if: env.SOLUTION_FILE != ''
        run: |
          dotnet list "$SOLUTION_FILE" package --vulnerable 2>&1 | tee security_log_backend.txt

          if grep -q -E "Critical|High|Moderate" security_log_backend.txt; then
            echo "Vulnerable NuGet packages detected"
            exit 1
          fi

      # ==========================================
      # NOTIFY COREGUARDAI ON FAILURE
      # ==========================================

      - name: Notify CodeGuardAI on Failure
        if: failure()
        run: |
          LOG_CONTENT=""

          FRONTEND_BUILD_LOG=$(find . -name "build_log_frontend.txt" | head -1)
          FRONTEND_SECURITY_LOG=$(find . -name "security_log_frontend.txt" | head -1)

          BACKEND_BUILD_LOG=$(find . -name "build_log_backend.txt" | head -1)
          BACKEND_SECURITY_LOG=$(find . -name "security_log_backend.txt" | head -1)

          if [ ! -z "$FRONTEND_BUILD_LOG" ]; then
            LOG_CONTENT="$LOG_CONTENT\n--- FRONTEND BUILD LOGS ---\n$(tail -40 "$FRONTEND_BUILD_LOG")"
          fi

          if [ ! -z "$FRONTEND_SECURITY_LOG" ]; then
            LOG_CONTENT="$LOG_CONTENT\n--- FRONTEND SECURITY LOGS ---\n$(tail -40 "$FRONTEND_SECURITY_LOG")"
          fi

          if [ ! -z "$BACKEND_BUILD_LOG" ]; then
            LOG_CONTENT="$LOG_CONTENT\n--- BACKEND BUILD LOGS ---\n$(tail -40 "$BACKEND_BUILD_LOG")"
          fi

          if [ ! -z "$BACKEND_SECURITY_LOG" ]; then
            LOG_CONTENT="$LOG_CONTENT\n--- BACKEND SECURITY LOGS ---\n$(tail -40 "$BACKEND_SECURITY_LOG")"
          fi

          if [ -z "$LOG_CONTENT" ]; then
            LOG_CONTENT="No build or security logs captured."
          fi

          PAYLOAD=$(jq -n \
            --arg repo "${{ github.repository }}" \
            --arg branch "${{ github.ref_name }}" \
            --arg sha "${{ github.sha }}" \
            --arg runId "${{ github.run_id }}" \
            --arg errorMessage "$LOG_CONTENT" \
            --arg pusherName "${{ github.actor }}" \
            --arg githubSecretKey "${{ secrets.CODEGUARD_SECRET_KEY }}" \
            '{
              repo: $repo,
              branch: $branch,
              commitSha: $sha,
              runId: $runId,
              errorMessage: $errorMessage,
              pusherName: $pusherName,
              githubSecretKey: $githubSecretKey
            }')

          CODEGUARD_URL=$(echo "${{ secrets.CODEGUARD_API_URL }}" | xargs)

          curl -X POST "${CODEGUARD_URL}/api/github/action-failure" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
